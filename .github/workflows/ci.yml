name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      APP_URL: http://localhost:3000
      AUTH_RATE_LIMIT_SECRET: ci-only-auth-rate-limit-secret
      DATABASE_URL: postgresql://budget_buddy:budget_buddy@localhost:5432/budget_buddy
      DIRECT_URL: postgresql://budget_buddy:budget_buddy@localhost:5432/budget_buddy

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.js', 'src/**/*.jsx', 'src/**/*.ts', 'src/**/*.tsx', 'prisma/**', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci

  preview:
    name: Vercel preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Pull Vercel preview configuration
        run: npx --yes vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx --yes vercel@latest build --token="$VERCEL_TOKEN"

      - name: Apply preview database migrations
        run: npm run db:deploy

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url="$(npx --yes vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Add deployment URL to job summary
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          echo "### Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "[$DEPLOYMENT_URL]($DEPLOYMENT_URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            ### ▲ Vercel preview deployed
            [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})
